services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - MAILPIT_HOST=mailpit
    volumes:
      - ./attachments:/app/attachments
      - ./data:/app/data
    depends_on:
      - mailpit
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        - PUBLIC_MAILPIT_URL=${PUBLIC_MAILPIT_URL:-http://localhost:8025}
    ports:
      - "8080:80"
    depends_on:
      - backend
    restart: unless-stopped

  mailpit:
    image: axllent/mailpit
    ports:
      - "1025:1025"
      - "8025:8025"
    restart: unless-stopped
